services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resumatch-backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - TOKENIZERS_PARALLELISM=false
    volumes:
      # Persist ChromaDB vector store across restarts
      - chroma_data:/app/chroma_db
      # Persist model cache so it's not re-downloaded
      - model_cache:/app/.cache
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    container_name: resumatch-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    restart: unless-stopped

volumes:
  chroma_data:
    driver: local
  model_cache:
    driver: local