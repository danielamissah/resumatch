name: CI / CD

on:
  push:
    branches: [master, develop]
    tags:
      - "v*"
  pull_request:
    branches: [master]

jobs:

  #  Job 1: Backend Tests — every push 
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        env:
          GROQ_API_KEY: test-key
          TOKENIZERS_PARALLELISM: "false"
          CHROMA_PERSIST_DIR: /tmp/test_chroma
        run: |
          pytest tests/ -v --tb=short


  #  Job 2: Frontend Type Check — every push 
  typecheck-frontend:
    name: Frontend Type Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit


  #  Job 3: Build & Push to Docker Hub — every push to master ──────────────
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    needs: [test-backend, typecheck-frontend]

    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Free disk space
        run: |
          sudo docker system prune -af
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            danielamissah/resumatch:latest
            danielamissah/resumatch:${{ github.sha }}
          build-args: |
            CI=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            danielamissah/resumatch-frontend:latest
            danielamissah/resumatch-frontend:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
